<!DOCTYPE html>
<html>
<head>
    <title>Fintech Dashboard</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">
        Nifty 100 Financial Intelligence Dashboard
    </h1>

    <form
    method="GET"
    action="/api/search/"
    class="mb-4"
>

    <div class="input-group">

        <input
            type="text"
            name="query"
            class="form-control"
            placeholder="Search company symbol..."
        >

        <button
            class="btn btn-primary"
            type="submit"
        >
            Search
        </button>

    </div>

</form>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">
            <tr>
                <th>Company</th>
                <th>Health Score</th>
                <th>Health Label</th>
            </tr>
        </thead>

        <tbody>

        {% for company in companies %}

            <tr>
                <td>{{ company.symbol }}</td>
                <td>{{ company.score }}</td>
                <td>{{ company.label }}</td>
            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>
</html>
