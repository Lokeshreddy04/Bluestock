<!DOCTYPE html>
<html>

<head>

    <title>
        Search Results
    </title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="mb-4">

        Search Results for:
        "{{ query }}"

    </h1>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">

            <tr>
                <th>Company</th>
                <th>Symbol</th>
            </tr>

        </thead>

        <tbody>

        {% for company in companies %}

            <tr>

                <td>
                    {{ company.company_name }}
                </td>

                <td>

                    <a href="/api/company/{{ company.symbol }}/">

                        {{ company.symbol }}

                    </a>

                </td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

</body>

</html>
